<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тест на привязанность</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 16px 0 20px;
            border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #e9ecef);
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; font-weight: 700; }
        .header p { font-size: 14px; color: var(--tg-theme-hint-color, #7f8c8d); margin-top: 4px; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--tg-theme-secondary-bg-color, #ecf0f1);
            border-radius: 10px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #3498db);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }
        .question-container { display: block; }
        .question-container.hidden { display: none; }
        .question-number {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #7f8c8d);
            margin-bottom: 8px;
            display: block;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }
        .option {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .option:active { transform: scale(0.98); }
        .option.selected {
            border-color: var(--tg-theme-button-color, #3498db);
            background: var(--tg-theme-button-color, #3498db);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .option input[type="radio"] { display: none; }
        .option-letter { font-weight: 700; margin-right: 12px; min-width: 24px; }
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
            background: var(--tg-theme-button-color, #3498db);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color, #e9ecef);
            color: var(--tg-theme-text-color, #000000);
        }
        .btn-secondary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: #2ecc71;
            color: #ffffff;
        }
        .btn-restart {
            background: var(--tg-theme-secondary-bg-color, #e9ecef);
            color: var(--tg-theme-text-color, #000000);
        }
        .results {
            display: none;
        }
        .results.active { display: block; }
        .result-card { text-align: center; }
        .result-type {
            font-size: 28px;
            font-weight: 800;
            margin: 16px 0 12px;
            padding: 16px;
            border-radius: 12px;
        }
        .result-type.secure { background: #d4edda; color: #155724; }
        .result-type.anxious { background: #f8d7da; color: #721c24; }
        .result-type.avoidant { background: #fff3cd; color: #856404; }
        .result-type.fearful { background: #e2d4f0; color: #4a235a; }
        .result-description {
            font-size: 16px;
            line-height: 1.7;
            margin: 16px 0 24px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 12px;
            text-align: left;
        }
        .score-bars {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 16px 0;
        }
        .score-item { text-align: left; }
        .score-label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .score-bar-bg {
            width: 100%;
            height: 20px;
            background: var(--tg-theme-secondary-bg-color, #ecf0f1);
            border-radius: 10px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease;
            width: 0%;
        }
        .bar-anxiety { background: linear-gradient(90deg, #e74c3c, #f39c12); }
        .bar-avoidance { background: linear-gradient(90deg, #3498db, #2ecc71); }
        .result-raw {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #7f8c8d);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--tg-theme-secondary-bg-color, #ecf0f1);
        }
        @media (prefers-color-scheme: dark) {
            .result-type.secure { background: #1a3a2a; color: #7ddfa0; }
            .result-type.anxious { background: #3a1a1a; color: #ff8a8a; }
            .result-type.avoidant { background: #3a2a1a; color: #ffd68a; }
            .result-type.fearful { background: #2a1a3a; color: #c8a0e8; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>🧠 Тип привязанности</h1>
            <p>15 вопросов о ваших отношениях</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="question-container" id="questionContainer">
            <span class="question-number" id="questionNumber">Вопрос 1/15</span>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prevBtn" disabled>Назад</button>
                <button class="btn btn-primary" id="nextBtn">Далее</button>
            </div>
        </div>

        <div class="results" id="resultsContainer">
            <div class="result-card">
                <h2 style="font-size:20px;">📊 Ваш результат</h2>
                <div class="result-type" id="resultType"></div>
                <div class="score-bars">
                    <div class="score-item">
                        <div class="score-label">
                            <span>😰 Тревожность</span>
                            <span id="anxietyPercent">0%</span>
                        </div>
                        <div class="score-bar-bg">
                            <div class="score-bar-fill bar-anxiety" id="anxietyBar"></div>
                        </div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">
                            <span>🚫 Избегание</span>
                            <span id="avoidancePercent">0%</span>
                        </div>
                        <div class="score-bar-bg">
                            <div class="score-bar-fill bar-avoidance" id="avoidanceBar"></div>
                        </div>
                    </div>
                </div>
                <div class="result-description" id="resultDescription"></div>
                <div class="result-raw" id="resultRaw"></div>
                <button class="btn btn-restart" onclick="restartTest()">🔄 Пройти заново</button>
            </div>
        </div>
    </div>

    <script>
        // ===== TELEGRAM =====
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        // ===== ДАННЫЕ ТЕСТА =====
        const questions = [
            "Я часто боюсь, что мой партнер потеряет ко мне интерес.",
            "Когда я не чувствую внимания со стороны партнера, я начинаю сильно тревожиться.",
            "Мне комфортно зависеть от моего партнера и позволять ему зависеть от меня.",
            "Мне не нравится, когда партнер слишком близко ко мне подходит или требует слишком много внимания.",
            "Я беспокоюсь, что мой партнер на самом деле меня не любит.",
            "Я предпочитаю сохранять дистанцию в отношениях.",
            "Мне нужны постоянные заверения, что партнер меня не бросит.",
            "Я чувствую себя спокойно, когда мы с партнером проводим много времени вместе.",
            "Меня преследует страх быть покинутым.",
            "Мне трудно полностью открыться партнеру.",
            "Я обычно спокоен(на) за свои отношения и не переживаю, что нас ждет.",
            "Когда партнер слишком эмоционален, это меня раздражает.",
            "Я часто переживаю, что партнер может найти кого-то лучше.",
            "Мне легко говорить с партнером о своих чувствах и переживаниях.",
            "Я чувствую, что мои эмоции в отношениях очень нестабильны."
        ];

        const scoringKey = [
            [0, 'A', false], [1, 'A', false], [2, 'B', true], [3, 'B', false],
            [4, 'A', false], [5, 'B', false], [6, 'A', false], [7, 'B', true],
            [8, 'A', false], [9, 'B', false], [10, 'A', true], [11, 'B', false],
            [12, 'A', false], [13, 'B', true], [14, 'A', false]
        ];

        const optionLabels = ['a', 'b', 'c', 'd'];
        const optionTexts = ['Совершенно не согласен', 'Скорее не согласен', 'Скорее согласен', 'Полностью согласен'];
        const optionValues = [1, 2, 3, 4];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);

        // ===== DOM =====
        const questionContainer = document.getElementById('questionContainer');
        const resultsContainer = document.getElementById('resultsContainer');
        const questionNumber = document.getElementById('questionNumber');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');

        function renderQuestion(index) {
            questionNumber.textContent = `Вопрос ${index + 1}/${questions.length}`;
            questionText.textContent = questions[index];

            let html = '';
            for (let i = 0; i < optionLabels.length; i++) {
                const isSelected = (answers[index] === i);
                html += `
                    <label class="option ${isSelected ? 'selected' : ''}" data-index="${i}">
                        <input type="radio" name="question" value="${i}" ${isSelected ? 'checked' : ''}>
                        <span class="option-letter">${optionLabels[i]})</span>
                        ${optionTexts[i]}
                    </label>
                `;
            }
            optionsContainer.innerHTML = html;

            document.querySelectorAll('.option').forEach(label => {
                label.addEventListener('click', function(e) {
                    if (e.target.type === 'radio') return;
                    const radio = this.querySelector('input[type="radio"]');
                    radio.checked = true;
                    radio.dispatchEvent(new Event('change'));
                });

                const radio = label.querySelector('input[type="radio"]');
                radio.addEventListener('change', function() {
                    const idx = parseInt(this.value);
                    answers[currentQuestion] = idx;
                    document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                    this.closest('.option').classList.add('selected');
                    updateButtons();
                    updateProgress();
                    if (navigator.vibrate) navigator.vibrate(10);
                });
            });

            updateButtons();
            updateProgress();
        }

        function updateButtons() {
            prevBtn.disabled = (currentQuestion === 0);

            if (currentQuestion === questions.length - 1) {
                const allAnswered = answers.every(a => a !== null);
                nextBtn.textContent = allAnswered ? '📊 Результат' : 'Далее →';
                nextBtn.disabled = !allAnswered;
                nextBtn.className = allAnswered ? 'btn btn-success' : 'btn btn-primary';
            } else {
                nextBtn.textContent = 'Далее →';
                nextBtn.className = 'btn btn-primary';
                nextBtn.disabled = (answers[currentQuestion] === null);
            }
        }

        function updateProgress() {
            const answered = answers.filter(a => a !== null).length;
            progressFill.style.width = (answered / questions.length) * 100 + '%';
        }

        function goToQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            currentQuestion = index;
            renderQuestion(index);
        }

        function nextQuestion() {
            if (currentQuestion === questions.length - 1) {
                if (answers.every(a => a !== null)) showResults();
                return;
            }
            if (answers[currentQuestion] !== null) goToQuestion(currentQuestion + 1);
        }

        function prevQuestion() {
            if (currentQuestion > 0) goToQuestion(currentQuestion - 1);
        }

        function showResults() {
            questionContainer.classList.add('hidden');
            resultsContainer.classList.add('active');

            let anxietyScore = 0, avoidanceScore = 0;
            let maxAnxiety = 0, maxAvoidance = 0;

            for (let i = 0; i < scoringKey.length; i++) {
                const [qIdx, scale, reversed] = scoringKey[i];
                let raw = optionValues[answers[qIdx]];
                if (reversed) raw = 5 - raw;

                if (scale === 'A') {
                    anxietyScore += raw;
                    maxAnxiety += 4;
                } else {
                    avoidanceScore += raw;
                    maxAvoidance += 4;
                }
            }

            const anxietyPercent = (anxietyScore / maxAnxiety) * 100;
            const avoidancePercent = (avoidanceScore / maxAvoidance) * 100;

            let type, typeClass, description;
            if (anxietyPercent < 50 && avoidancePercent < 50) {
                type = 'Надежный тип';
                typeClass = 'secure';
                description = '✅ Вы комфортно чувствуете себя в близких отношениях. Доверяете партнеру, не боитесь близости.';
            } else if (anxietyPercent >= 50 && avoidancePercent < 50) {
                type = 'Тревожный тип';
                typeClass = 'anxious';
                description = '😰 Вы часто беспокоитесь о стабильности отношений, боитесь, что партнер вас бросит.';
            } else if (anxietyPercent < 50 && avoidancePercent >= 50) {
                type = 'Избегающий тип';
                typeClass = 'avoidant';
                description = '🚫 Вы цените независимость и дистанцию. Близость вызывает дискомфорт.';
            } else {
                type = 'Тревожно-избегающий тип';
                typeClass = 'fearful';
                description = '🌀 Вы одновременно боитесь близости и боитесь остаться в одиночестве.';
            }

            document.getElementById('resultType').textContent = type;
            document.getElementById('resultType').className = 'result-type ' + typeClass;
            document.getElementById('resultDescription').textContent = description;

            setTimeout(() => {
                document.getElementById('anxietyBar').style.width = anxietyPercent + '%';
                document.getElementById('avoidanceBar').style.width = avoidancePercent + '%';
                document.getElementById('anxietyPercent').textContent = Math.round(anxietyPercent) + '%';
                document.getElementById('avoidancePercent').textContent = Math.round(avoidancePercent) + '%';
            }, 100);

            document.getElementById('resultRaw').textContent = 
                `Сырые баллы: Тревога = ${anxietyScore}/${maxAnxiety}, Избегание = ${avoidanceScore}/${maxAvoidance}`;

            // Отправка результата в Telegram
            if (tg) {
                tg.sendData(JSON.stringify({
                    type: type,
                    anxiety: Math.round(anxietyPercent),
                    avoidance: Math.round(avoidancePercent)
                }));
            }
        }

        function restartTest() {
            answers = new Array(questions.length).fill(null);
            currentQuestion = 0;
            questionContainer.classList.remove('hidden');
            resultsContainer.classList.remove('active');
            renderQuestion(0);
            updateProgress();
            document.getElementById('anxietyBar').style.width = '0%';
            document.getElementById('avoidanceBar').style.width = '0%';
        }

        // ===== ОБРАБОТЧИКИ =====
        prevBtn.addEventListener('click', prevQuestion);
        nextBtn.addEventListener('click', nextQuestion);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === 'ArrowRight') {
                if (!nextBtn.disabled) nextBtn.click();
            }
            if (e.key === 'ArrowLeft') {
                if (!prevBtn.disabled) prevBtn.click();
            }
        });

        // ===== СТАРТ =====
        renderQuestion(0);
        updateProgress();
    </script>
</body>
</html>
